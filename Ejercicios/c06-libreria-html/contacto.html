<body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">

<form>
  <div class="mb-3">
    <label for="InputName" class="form-label">Nombre</label>
    <input type="text" class="form-control" id="InputName" required>
  </div>
  <div class="mb-3">
    <label for="InputEmail" class="form-label">Email address</label>
    <input type="email" class="form-control" id="InputEmail" aria-describedby="emailHelp" required>
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="InputAsunto" class="form-label">Asunto</label>
    <select class="form-select" aria-label="Default select example">
  <option selected>Consulta sobre un libro</option>
  <option value="1">Reclamo sobre un libro</option>
  <option value="2">Sugerencia para la librería</option>
</select>
  </div>
  <div class="mb-3">
    <label for="InputMensaje" class="form-label">Mensaje</label>
    <input type="text" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
